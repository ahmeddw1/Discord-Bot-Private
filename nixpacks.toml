[phases.setup]
# This tells Railway to install Python 3.12 and FFmpeg
nixPkgs = ["python312", "ffmpeg"]
# These are the system libraries needed for Discord voice/audio
aptPkgs = ["libopus-dev", "libnacl-dev", "build-essential"]

[phases.install]
# This manually ensures a virtual environment is created and used
cmds = [
    "python -m venv /opt/venv",
    "/opt/venv/bin/pip install --upgrade pip",
    "/opt/venv/bin/pip install -r requirements.txt"
]

[phases.build]
# Keeps the environment clean
dependsOn = ["install"]

[start]
# Ensures the bot runs using the virtual environment we created
cmd = "/opt/venv/bin/python bot.py"
